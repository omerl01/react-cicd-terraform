name: CI/CD Pipeline

on:
  push:
    branches:
      - main 

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read  # Required for actions/checkout

jobs:
  deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
# 2. Install Node.js runtime environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci # Using 'npm ci' ensures clean, automated dependency installations
        working-directory: app

      # 4. Build the application
      - name: Build Application
        run: npm run build
        working-directory: app

      # 5. Authenticate to AWS using OIDC (No static passwords or keys!)
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # The IAM Role ARN created for GitHub
          aws-region: eu-central-1                    # Aligned with Terraform region
          role-session-name: GitHubActionsWorkflow

      # 6. Upload build files to S3
      - name: Deploy Assets to S3
        run: |
          aws s3 sync app/dist/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      # 7. Invalidate the CloudFront cache
      # This ensures edge locations clear out old files so your users see updates instantly.
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"